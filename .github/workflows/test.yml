name: CI

on:
  push:
    paths:
      - 'packages/contracts-evm/**'
      - 'packages/contracts-solana/**'
      - 'packages/operator/**'
      - 'packages/canceler/**'
      - 'packages/contracts-terraclassic/**'
      - 'packages/multichain-rs/**'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'packages/contracts-evm/**'
      - 'packages/contracts-solana/**'
      - 'packages/operator/**'
      - 'packages/canceler/**'
      - 'packages/contracts-terraclassic/**'
      - 'packages/multichain-rs/**'
      - '.github/workflows/test.yml'
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci
  CARGO_TERM_COLOR: always

jobs:
  # ==========================================================================
  # EVM Contracts Tests
  # ==========================================================================
  contracts-evm:
    strategy:
      fail-fast: true

    name: EVM Contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts-evm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show Forge version
        run: |
          forge --version

      - name: Run Forge fmt
        run: |
          forge fmt --check
        id: fmt

      - name: Run Forge build
        run: |
          forge build --sizes
        id: build

      - name: Run Forge tests
        run: |
          forge test -vvv
        id: test

  # ==========================================================================
  # Rust Operator Tests
  # ==========================================================================
  operator:
    name: Operator
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: operator
          POSTGRES_PASSWORD: operator
          POSTGRES_DB: operator
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/operator -> target

      - name: Check formatting
        working-directory: packages/operator
        run: cargo fmt --check

      - name: Run Clippy
        working-directory: packages/operator
        env:
          DATABASE_URL: postgres://operator:operator@localhost:5433/operator
        run: cargo clippy -- -D warnings

      - name: Build
        working-directory: packages/operator
        env:
          DATABASE_URL: postgres://operator:operator@localhost:5433/operator
        run: cargo build --release

      - name: Run tests
        working-directory: packages/operator
        env:
          DATABASE_URL: postgres://operator:operator@localhost:5433/operator
          RUST_BACKTRACE: 1
        run: cargo test --release -- --nocapture

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        working-directory: packages/operator
        run: cargo audit

  # ==========================================================================
  # Rust Canceler Tests
  # ==========================================================================
  canceler:
    name: Canceler
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/canceler -> target

      - name: Check formatting
        working-directory: packages/canceler
        run: cargo fmt --check

      - name: Run Clippy
        working-directory: packages/canceler
        run: cargo clippy -- -D warnings

      - name: Build
        working-directory: packages/canceler
        run: cargo build --release

      - name: Run tests
        working-directory: packages/canceler
        env:
          RUST_BACKTRACE: 1
        run: cargo test --release -- --nocapture

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        working-directory: packages/canceler
        run: cargo audit

  # ==========================================================================
  # multichain-rs Library (build, test, security audit)
  # ==========================================================================
  multichain-rs:
    name: multichain-rs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/multichain-rs -> target

      - name: Check formatting
        working-directory: packages/multichain-rs
        run: cargo fmt --check

      - name: Run Clippy
        working-directory: packages/multichain-rs
        run: cargo clippy --all-features -- -D warnings

      - name: Build
        working-directory: packages/multichain-rs
        run: cargo build --all-features --release

      - name: Run tests
        working-directory: packages/multichain-rs
        env:
          RUST_BACKTRACE: 1
        run: cargo test --all-features -- --nocapture

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        working-directory: packages/multichain-rs
        run: cargo audit

  # ==========================================================================
  # Terra Contracts Tests (CosmWasm)
  # ==========================================================================
  contracts-terra:
    name: Terra Contracts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/contracts-terraclassic/bridge -> target

      - name: Check formatting
        working-directory: packages/contracts-terraclassic/bridge
        run: cargo fmt --check

      - name: Run Clippy
        working-directory: packages/contracts-terraclassic/bridge
        run: cargo clippy -- -D warnings

      - name: Build
        working-directory: packages/contracts-terraclassic/bridge
        run: cargo build --release

      - name: Build WASM
        working-directory: packages/contracts-terraclassic/bridge
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Run tests
        working-directory: packages/contracts-terraclassic/bridge
        env:
          RUST_BACKTRACE: 1
        run: cargo test -- --nocapture

  # ==========================================================================
  # Solana Contracts Tests (Anchor)
  # ==========================================================================
  contracts-solana:
    name: Solana Contracts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v2.2.12/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: cargo install --git https://github.com/coral-xyz/anchor avm --force
      - run: avm install 0.32.1 && avm use 0.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JS dependencies
        working-directory: packages/contracts-solana
        run: npm ci

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/contracts-solana -> target

      - name: Check formatting
        working-directory: packages/contracts-solana
        run: cargo fmt --check

      - name: Build programs
        working-directory: packages/contracts-solana
        run: anchor build

      - name: Run tests
        working-directory: packages/contracts-solana
        env:
          RUST_BACKTRACE: 1
        run: anchor test --skip-build
