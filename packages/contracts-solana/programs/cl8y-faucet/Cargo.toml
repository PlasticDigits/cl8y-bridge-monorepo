[package]
name = "cl8y-faucet"
version = "0.1.0"
description = "CL8Y Bridge test token faucet"
edition = "2021"
license = "AGPL-3.0-only"

[lib]
crate-type = ["cdylib", "lib"]
name = "cl8y_faucet"

[features]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
cpi = ["no-entrypoint"]
default = []

[dependencies]
anchor-lang = "0.32.1"
anchor-spl = { version = "0.32.1", features = ["token"] }
