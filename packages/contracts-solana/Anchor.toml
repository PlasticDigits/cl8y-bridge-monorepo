[toolchain]
anchor_version = "0.32.1"
solana_version = "2.2.12"

[features]
seeds = false
skip-lint = false

[programs.localnet]
# Match packages/contracts-solana/keys/localnet/*-keypair.json (committed; used by make deploy-solana)
cl8y_bridge = "74o1KKwuUvtrf6ozbjmVrARnoHpQ4WjsQ647TCTKe1mW"
cl8y_faucet = "7uqKHSr6naMr3LakCSRkZpiRTBboALh4ZgZdw7hvTwG4"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Localnet"
wallet = "~/.config/solana/id.json"

[test]
startup_wait = 10000

[test.validator]
ledger = ".anchor/test-ledger"
# Clone canonical wSOL mint into local genesis (GitLab #84); register_token requires the mint account.
url = "https://api.mainnet-beta.solana.com"

[[test.validator.clone]]
address = "So11111111111111111111111111111111111111112"

# Token-2022 program (plain mints); required for `tests/token_2022_flow.test.ts`.
[[test.validator.clone]]
address = "TokenzQdBNbLqP5VEhdkAS6EPFLC1PHnBqCXEpPxuEb"

[scripts]
test = "npx ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.test.ts"
