[toolchain]
anchor_version = "0.32.1"
solana_version = "2.2.12"

[features]
seeds = false
skip-lint = false

[programs.localnet]
cl8y_bridge = "CL8YBr1dg3So1ana111111111111111111111111111"
cl8y_faucet = "CL8YFaucet1111111111111111111111111111111111"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Localnet"
wallet = "~/.config/solana/id.json"

[test]
startup_wait = 10000

[test.validator]
ledger = ".anchor/test-ledger"

[scripts]
test = "npx ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.test.ts"
