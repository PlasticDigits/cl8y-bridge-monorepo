[workspace]
resolver = "2"

members = [
    "bridge",
    "faucet",
    "packages/common",
]

# Note: external/cw20-mintable is gitignored. QA uses scripts/ensure-cw20-mintable-wasm.sh to
# clone CW20 sources (default: CosmWasm/cw-plus at v1.1.2) here and build cw20_mintable.wasm,
# or fall back to scripts/download-cw20-wasm.sh. Override: CW20_MINTABLE_REPO_URL / CW20_MINTABLE_REPO_REF.

[workspace.package]
version = "0.1.0"
authors = ["CL8Y Bridge Team"]
edition = "2021"
license = "AGPL-3.0"
repository = "https://github.com/CL8Y-Bridge-EVM-smartcontracts"

[workspace.dependencies]
# Terra Classic compatible versions (matches cw20-mintable which is live on mainnet)
cosmwasm-std = { version = "1.5.11", features = ["staking"] }
cosmwasm-schema = "1.5.9"
cw-storage-plus = "1.2.0"
cw2 = "1.1.2"
cw20 = "1.1.2"
cw20-base = "1.1.2"
cw-multi-test = "1.2.0"
thiserror = "1.0.4"
schemars = "0.8.15"
serde = { version = "1.0.188", default-features = false, features = ["derive"] }
base64ct = "=1.7.3"

[profile.release]
opt-level = 3
debug = false
rpath = false
lto = true
debug-assertions = false
codegen-units = 1
panic = 'abort'
incremental = false
overflow-checks = true
